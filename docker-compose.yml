
services:
  # 1. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: nyaysetu-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nyaysetu}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-nyaysetu}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Backend (Spring Boot)
  backend-spring:
    build:
      context: ./backend/nyaysetu-backend
      dockerfile: Dockerfile
    container_name: spring-service
    depends_on:
      db:
        condition: service_healthy
      backend-python:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-}
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME:-nyaysetu}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - GROQ_API_KEY=${GROQ_API_KEY:?Please set GROQ_API_KEY in your .env file}
      - PII_NER_URL=${PII_NER_URL:-http://backend-python:8001/internal/pii/entities}
      - JWT_SECRET=${JWT_SECRET:?Please set JWT_SECRET in your .env file}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms256m
    mem_limit: 768M
    restart: always

  # 3. Python (Data/AI/Microservice)
  backend-python:
    build:
      context: ./nlp-orchestrator
      dockerfile: Dockerfile
    container_name: python-service
    ports:
      - "8001:8001"
    environment:
      - ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY:?Please set GROQ_API_KEY in your .env file}
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY}
      - PII_NER_MODEL=${PII_NER_MODEL:-ai4bharat/IndicNER}
      # Keep this aligned with FRONTEND_URL; set both explicitly in .env when needed.
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost}
    mem_limit: 2G
    restart: always

  # 4. Frontend (React + Nginx)
  frontend-react:
    build:
      context: ./frontend/nyaysetu-frontend
      dockerfile: Dockerfile
    container_name: react-app
    ports:
      - "80:80"
    mem_limit: 128M
    depends_on:
      - backend-spring
      - backend-python
    restart: always

volumes:
  postgres_data:

networks:
  default:
    name: app-network
