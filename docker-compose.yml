services:
  # 1. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: nyaysetu-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nyaysetu}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-nyaysetu}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (Cache for LLM responses + embeddings)
  redis:
    image: redis:7-alpine
    container_name: nyaysetu-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    # Persist to disk every 60s if at least 1 key changed
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. Backend (Spring Boot)
  backend-spring:
    build:
      context: ./backend/nyaysetu-backend
      dockerfile: Dockerfile
    container_name: spring-service
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-}
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME:-nyaysetu}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - GROQ_API_KEY=${GROQ_API_KEY:?Please set GROQ_API_KEY in your .env file}
      - JWT_SECRET=${JWT_SECRET:?Please set JWT_SECRET in your .env file}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms256m
    mem_limit: 768M
    restart: always

  # 4. Python (Data/AI/Microservice)
  backend-python:
    build:
      context: ./nlp-orchestrator
      dockerfile: Dockerfile
    container_name: python-service
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      - ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY:?Please set GROQ_API_KEY in your .env file}
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost}
      # Redis — uses internal Docker network hostname
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-86400}
      - EMBEDDING_CACHE_TTL_SECONDS=${EMBEDDING_CACHE_TTL_SECONDS:-604800}
    mem_limit: 256M
    restart: always

  # 5. Frontend (React + Nginx)
  frontend-react:
    build:
      context: ./frontend/nyaysetu-frontend
      dockerfile: Dockerfile
    container_name: react-app
    ports:
      - "80:80"
    mem_limit: 128M
    depends_on:
      - backend-spring
      - backend-python
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: app-network
