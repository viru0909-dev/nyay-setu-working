name: Auto Reviewer & PR Handler

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  pr-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Assign Reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = 'vijaypatil477';
            const prAuthor = pr.user.login;

            // Skip requesting review from the owner if the owner opened the PR themselves
            if (prAuthor !== owner) {
              try {
                console.log(`Requesting review from ${owner} for PR #${pr.number}`);
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  reviewers: [owner]
                });
              } catch (e) {
                console.warn(`Failed to request review from ${owner}:`, e.message);
              }
            } else {
              console.log("PR was opened by the repository owner, skipping self-review request.");
            }
