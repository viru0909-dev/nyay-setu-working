name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # GitHub Container Registry
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Spring Boot
      uses: docker/build-push-action@v5
      with:
        context: ./backend/nyaysetu-backend
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/${{ github.repository }}/spring-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Python
      uses: docker/build-push-action@v5
      with:
        context: ./nlp-orchestrator
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/${{ github.repository }}/python-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push React
      uses: docker/build-push-action@v5
      with:
        context: ./frontend/nyaysetu-frontend
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/${{ github.repository }}/react-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Message
        run: echo "Images are ready in GHCR. Ready for deployment to Railway/Fly.io/EC2."