name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Run Backend Tests
        run: |
          cd backend/nyaysetu-backend
          mvn test

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd frontend/nyaysetu-frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend/nyaysetu-frontend
          npm run test -- --run

  nlp-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install NLP Dependencies
        run: |
          cd nlp-orchestrator
          pip install -r requirements.txt

      - name: Run NLP Tests
        env:
          GROQ_API_KEY: dummy_key
          GEMINI_API_KEY: dummy_key
        run: |
          cd nlp-orchestrator
          python -m pytest

  build-and-push:
    needs:
      - backend-tests
      - frontend-tests
      - nlp-tests

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Resolve Backend Maven Dependencies
        run: mvn -B -f backend/nyaysetu-backend/pom.xml dependency:go-offline

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Trivy Scan - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend/nyaysetu-backend"
          severity: "CRITICAL"
          exit-code: "0"

      - name: Run Trivy Scan - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./frontend/nyaysetu-frontend"
          severity: "CRITICAL"
          exit-code: "0"

      - name: Run Trivy Scan - NLP
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./nlp-orchestrator"
          severity: "CRITICAL"
          exit-code: "0"

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Spring Boot
        uses: docker/build-push-action@v5
        with:
          context: ./backend/nyaysetu-backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/spring-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Python
        uses: docker/build-push-action@v5
        with:
          context: ./nlp-orchestrator
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/python-service:latest
          cache-from: type=gha

      - name: Build and Push React
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/nyaysetu-frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/react-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push

    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Message
        run: echo "Images are ready in GHCR. Ready for deployment to Railway/Fly.io/EC2."
