<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon-32x32.png" />
  <link
    rel="preload"
    as="image"
    type="image/webp"
    href="/scales-light-720.webp"
    imagesrcset="/scales-light-480.webp 480w, /scales-light-720.webp 720w"
    imagesizes="min(50vw, 480px)"
    media="(min-width: 901px) and (prefers-color-scheme: light)"
  />
  <link
    rel="preload"
    as="image"
    type="image/webp"
    href="/scales-dark-720.webp"
    imagesrcset="/scales-dark-480.webp 480w, /scales-dark-720.webp 720w"
    imagesizes="min(50vw, 480px)"
    media="(min-width: 901px) and (prefers-color-scheme: dark)"
  />

  <!-- PWA Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e3a8a" />
  <meta name="description" content="Offline-first Legal Justice Platform for Indian Judiciary" />

  <!--
    Content Security Policy — defense-in-depth meta tag.
    The primary CSP is set as an HTTP response header in nginx.conf (production)
    and SecurityConfig.java (API responses). This meta tag covers any host that
    serves the static bundle but doesn't set the header (Vercel preview, local
    file://, ad-hoc static servers).

    Directives that meta CSP cannot enforce (frame-ancestors, report-uri,
    sandbox) are intentionally omitted here — they only work as headers.
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nyay-setu-frontend.vercel.app wss:; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
  />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  <!-- Apple-specific PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NyaySetu" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Manifest will be auto-injected by vite-plugin-pwa during build -->

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://cdn.jsdelivr.net https://nyaysetubackend.onrender.com http://localhost:8080; frame-ancestors 'none';">

  <title>NyaySetu - Virtual Judiciary Platform</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
