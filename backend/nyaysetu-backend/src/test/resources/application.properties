# ---- TEST OVERRIDES ----
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

jwt.secret=test-secret-key-minimum-256-bits-required-for-tests-only
jwt.expiration=86400000
cors.allowed.origins=http://localhost:5173

app.frontend.url=http://localhost:5173
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test

# Exclude OAuth2 auto-configuration that requires HttpSecurity in @WebMvcTest slice contexts.
# Without this, Spring Boot tries to create an oauth2SecurityFilterChain bean which
# requires HttpSecurity — a bean not available in web-layer slice tests — causing
# ApplicationContext load failure and all @WebMvcTest tests to error (not fail).
spring.autoconfigure.exclude=org.springframework.boot.security.oauth2.client.autoconfigure.servlet.OAuth2ClientWebSecurityAutoConfiguration
