# ---- TEST OVERRIDES ----
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# For Spring property-based JWT secret usage
jwt.secret=test-secret-key-minimum-256-bits-required-for-tests-only

# Also provide dummy env-style secret for tests that enforce presence of JWT_SECRET env var
# (Some tests/frameworks expect the env var name; setting it here via placeholder is harmless for prod.)
JWT_SECRET=test-secret-key-minimum-256-bits-required-for-tests-only

jwt.expiration=86400000
cors.allowed.origins=http://localhost:5173
server.servlet.context-path=/api/v1
