# Logging Configuration
logging.config=classpath:logback-spring.xml

# Server Configuration
server.port=8080
server.forward-headers-strategy=NATIVE

# Application Name
spring.application.name=nyaysetu-backend

# Render cold start fix (safe for local too)
spring.main.lazy-initialization=true

# =========================
# DATABASE (LOCAL DOCKER FIX)
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/nyaysetu
spring.datasource.username=nyayuser
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari / Pool settings
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.binaryTransfer=false
spring.datasource.hikari.data-source-properties.cancelSignalTimeout=0
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true

# =========================
# JPA CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.validate-on-migrate=true
spring.flyway.ignore-missing-migrations=false
# Use a separate connection for Flyway (Direct Connection) to avoid Transaction Pooler issues
# Defaults to normal datasource if not specified (e.g. locally)
# spring.flyway.url=${FLYWAY_URL:${spring.datasource.url}}
# spring.flyway.user=${FLYWAY_USER:${spring.datasource.username}}
# spring.flyway.password=${FLYWAY_PASSWORD:${spring.datasource.password}} main

# =========================
# JWT (LOCAL SAFE)
# =========================
jwt.secret=nyaysetu-dev-secret-key-123456789
jwt.expiration=86400000
# JWT Configuration
jwt.secret=${JWT_SECRET:nyaysetu-2024-secure-jwt-signing-key-minimum-256-bits-required}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# =========================
# CORS
# =========================
cors.allowed.origins=http://localhost:5173,http://localhost:4174,http://localhost:3000

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

file.upload-dir=backend/uploads
app.upload.fir-path=backend/uploads/fir
app.upload.evidence-path=backend/uploads/evidence

# =========================
# EMAIL (OPTIONAL LOCAL)
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# FRONTEND
# =========================
app.frontend.url=http://localhost:5173
app.password-reset.token-validity=1800000

# =========================
# AI SERVICES (optional local placeholders)
# =========================
gemini.model=gemini-1.5-flash
gemini.api.key=

openai.api.key=your-openai-api-key-here

ollama.base.url=http://localhost:11434
ollama.model=gemma3:1b
ai.provider=ollama

groq.api.key=
groq.model=llama-3.1-8b-instant

azure.openai.endpoint=https://uaenorth.api.cognitive.microsoft.com/
azure.openai.api.key=
azure.openai.deployment.name=nyay-gpt

azure.document.intelligence.api.key=
azure.document.intelligence.endpoint=

bhashini.api.key=
bhashini.user.id=
bhashini.pipeline.id=
bhashini.url=https://dhruva-api.bhashini.gov.in/services/inference/pipeline

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================
# LOGGING LEVELS
# =========================
logging.level.com.nyaysetu=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
# Standard framework logging (Revert to DEBUG if troubleshooting 404s)
# logging.level.org.springframework.web=INFO
# logging.level.org.springframework.security=INFO
# logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO

# =========================
# CHAT CONFIG
# =========================
chat.session.timeout.minutes=30
chat.max.messages.per.session=100
chat.max.messages.per.session=100

# Groq AI Configuration
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.1-8b-instant

# Bhashini Configuration
bhashini.api.key=${BHASHINI_API_KEY:}
bhashini.user.id=${BHASHINI_USER_ID:}
bhashini.pipeline.id=${BHASHINI_PIPELINE_ID:}
bhashini.url=https://dhruva-api.bhashini.gov.in/services/inference/pipeline




spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
