    post:
      tags:
        - NLP Orchestrator
      summary: "Synchronous legal query analysis and research (testing only)"
      description: "Synchronous legal query analysis and research (testing only) (Served by Python microservice on port 8001)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                query: "What is the penalty for driving without a license in India?"
                language: en
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Successful operation"
        '401':
          description: "Unauthorized"
        '403':
          description: "Forbidden"
  /api/legal/analyze-stream:
